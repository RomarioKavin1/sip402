<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" gradientUnits="userSpaceOnUse" x1="256" y1="0" x2="256" y2="512">
      <stop stop-color="#2B82FF"/>
      <stop offset="1" stop-color="#0050CC"/>
    </linearGradient>
    <radialGradient id="sheen" gradientUnits="userSpaceOnUse" cx="256" cy="92" r="320">
      <stop stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="drop" gradientUnits="userSpaceOnUse" x1="256" y1="120" x2="256" y2="420">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EAF2FF"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect width="512" height="512" rx="116" fill="url(#tile)"/>
  <rect width="512" height="512" rx="116" fill="url(#sheen)"/>

  <!-- sip droplet -->
  <path d="M256 116 C 308 196 350 252 350 316 a 94 94 0 1 1 -188 0 C 162 252 204 196 256 116 Z" fill="url(#drop)"/>

  <!-- payment slot (negative space cut from the droplet → x402 'Payment Required' nod) -->
  <rect x="194" y="346" width="124" height="24" rx="12" fill="url(#tile)"/>

  <!-- highlight on the droplet -->
  <ellipse cx="224" cy="226" rx="16" ry="30" fill="#FFFFFF" fill-opacity="0.55" transform="rotate(-20 224 226)"/>
</svg>
